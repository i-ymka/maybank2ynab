<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybank to YNAB</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- PDF.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <h1>Maybank → YNAB</h1>
                    <p class="subtitle">Import your Maybank statements to YNAB</p>
                </div>
                <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span class="toggle-label">Theme</span>
                </button>
            </div>
        </header>

        <!-- Settings Section -->
        <section class="settings-section">
            <h2>Settings</h2>
            <div class="token-input">
                <label for="ynab-token">YNAB API Token:</label>
                <div class="input-group">
                    <input type="password" id="ynab-token" placeholder="Enter your YNAB token">
                    <button id="toggle-token" class="btn-icon" title="Show/Hide token">
                        <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                    <button id="save-token" class="btn-secondary">Save</button>
                </div>
                <p class="hint">Get your token at <a href="https://app.ynab.com/settings/developer" target="_blank">YNAB Developer Settings</a></p>
            </div>
            <div class="connection-status" id="connection-status">
                <!-- Status will be shown here -->
            </div>
        </section>

        <!-- Upload Section -->
        <section class="upload-section">
            <h2>Upload Statements</h2>
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-content">
                    <div class="drop-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                    </div>
                    <p>Drop PDF statements here</p>
                    <p class="hint">or click to select files</p>
                </div>
                <input type="file" id="file-input" accept=".pdf" multiple hidden>
            </div>
            <div class="file-list" id="file-list">
                <!-- Uploaded files will appear here -->
            </div>
        </section>

        <!-- Preview Section -->
        <section class="preview-section" id="preview-section" style="display: none;">
            <h2>Preview Transactions</h2>
            <div class="preview-stats" id="preview-stats">
                <!-- Stats will appear here -->
            </div>
            <div class="table-container">
                <table id="transactions-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Date</th>
                            <th>Payee</th>
                            <th>Category</th>
                            <th>Memo</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <!-- Transactions will be inserted here -->
                    </tbody>
                </table>
            </div>
            <div class="actions">
                <button id="clear-btn" class="btn-secondary">Clear All</button>
                <button id="check-ynab-btn" class="btn-secondary">Check YNAB for Duplicates</button>
                <button id="import-btn" class="btn-primary">Import to YNAB</button>
            </div>
        </section>

        <!-- Result Section -->
        <section class="result-section" id="result-section" style="display: none;">
            <div class="result-card" id="result-card">
                <!-- Import results will appear here -->
            </div>
        </section>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loading-text">Processing...</p>
    </div>

    <!-- Scripts -->
    <script src="js/payee-mappings.js"></script>
    <script src="js/pdf-parser.js"></script>
    <script src="js/ynab-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
